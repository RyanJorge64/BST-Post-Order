<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Tree Traversal | Post Order</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <div class="sideBarParent">
        <div class="childContainer">
        <div class="titleCon">
            <span class="pulseEffect"></span>
        <h1 class="title">Binary Tree Traversal</h1>
        </div>
        <p class="subTitle">Post Order</p>
        <hr>
        <p class="nodeTitle">Node:</p>
        <div class="selectorCont">
        <input placeholder="Enter a number" id="num">
            <select name="Action" id="selector">
                <option value="Insert">Insert</option>
                <option value="Delete">Delete</option>
            </select>
        </div>
        <div class="btnContainer">
            <button class="actionButton">Inset</button> <!--set to insertion by default-->
            <button class="TraverseButton">Traverse</button>
            <div class="miscBtns">
                <button class="generateTree">Generate</button>
                <button class="clearCanvas">Clear</button>
            </div>
        </div>
        <hr>
        <div class="uselessCheckboxes">
        <label><input type="checkbox" id="checkbox" class="checkbox"> Option 1</label>
        <label><input type="checkbox" id="checkbox" class="checkbox"> Option 2</label>
        <label><input type="checkbox" id="checkbox" class="checkbox"> Option 3</label>
        </div>
        </div>
    </div>

    <div class="screenContainer">
        <div class="screen">

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
